<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" role="img" aria-labelledby="t2">
  <title id="t2">Settings API tab with keys for Gemini, Pexels, and Unsplash</title>
  <rect width="760" height="320" fill="#fff" stroke="#dcdcde"/>
  <text x="24" y="40" font-family="Segoe UI, sans-serif" font-size="20" font-weight="600" fill="#1d2327">Settings - API</text>
  <rect x="24" y="60" width="712" height="44" fill="#f6f7f7" stroke="#dcdcde" rx="4"/>
  <text x="36" y="88" font-family="Segoe UI, monospace" font-size="12" fill="#50575e">Gemini API key ****************</text>
  <rect x="24" y="120" width="712" height="44" fill="#f6f7f7" stroke="#dcdcde" rx="4"/>
  <text x="36" y="148" font-family="Segoe UI, monospace" font-size="12" fill="#50575e">Pexels API key (optional) ********</text>
  <rect x="24" y="180" width="712" height="44" fill="#f6f7f7" stroke="#dcdcde" rx="4"/>
