<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="t3">
  <title id="t3">Queue bulk paste: columns for title, keyword, extras, schedule</title>
  <rect width="760" height="360" fill="#fff" stroke="#dcdcde"/>
  <text x="24" y="36" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#1d2327">Queue - Bulk queue</text>
  <text x="24" y="62" fill="#50575e" font-family="Segoe UI, sans-serif" font-size="12">Paste from a spreadsheet (tabs) or use pipes | between fields.</text>
  <rect x="24" y="80" width="712" height="200" fill="#fcfcfc" stroke="#2271b1" stroke-dasharray="6 4" rx="4"/>
  <text x="40" y="110" font-family="Consolas, monospace" font-size="11" fill="#1d2327">Title here | Focus keyphrase | other, keywords | 12,5 | how-to</text>
  <text x="40" y="135" font-family="Consolas, monospace" font-size="11" fill="#1d2327">Another title | secondary kw | tip, guide | | standard</text>
  <text x="40" y="240" font-family="Segoe UI, sans-serif" font-size="11" fill="#646970">Columns: title | focus | other keywords (comma) | category IDs | article format slug</text>
  <rect x="24" y="280" width="220" height="32" fill="#f0f0f1" stroke="#8c8f94" rx="2"/>
  <text x="36" y="301" font-family="Segoe UI, sans-serif" font-size="11" fill="#1d2327">Stagger: One job per day ...</text>
  <text x="260" y="301" fill="#50575e" font-family="Segoe UI, sans-serif" font-size="11">Start date + publish time from Automation tab</text>
</svg>
