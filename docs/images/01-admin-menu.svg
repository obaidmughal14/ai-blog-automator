<svg xmlns="http://www.w3.org/2000/svg" width="760" height="280" viewBox="0 0 760 280" role="img" aria-labelledby="t1">
  <title id="t1">WordPress admin sidebar with AI Automator menu</title>
  <rect width="760" height="280" fill="#f0f0f1"/>
  <rect width="200" height="280" fill="#1d2327"/>
  <text x="16" y="36" fill="#f0f0f1" font-family="Segoe UI, sans-serif" font-size="13">Posts</text>
  <text x="16" y="62" fill="#f0f0f1" font-family="Segoe UI, sans-serif" font-size="13">Media</text>
  <text x="16" y="88" fill="#f0f0f1" font-family="Segoe UI, sans-serif" font-size="13">Pages</text>
  <rect x="0" y="108" width="200" height="32" fill="#2271b1"/>
  <text x="16" y="130" fill="#fff" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600">AI Automator</text>
  <text x="24" y="158" fill="#a7aaad" font-family="Segoe UI, sans-serif" font-size="12">- Dashboard</text>
  <text x="24" y="180" fill="#a7aaad" font-family="Segoe UI, sans-serif" font-size="12">- Settings</text>
  <text x="24" y="202" fill="#a7aaad" font-family="Segoe UI, sans-serif" font-size="12">- Generate</text>
  <text x="24" y="224" fill="#a7aaad" font-family="Segoe UI, sans-serif" font-size="12">- Queue</text>
  <rect x="200" y="0" width="560" height="48" fill="#fff" stroke="#c3c4c7"/>
  <text x="220" y="32" fill="#1d2327" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600">AI Automator</text>
  <text x="220" y="88" fill="#50575e" font-family="Segoe UI, sans-serif" font-size="13">Open any submenu item to configure or run the plugin.</text>
  <text x="220" y="240" fill="#646970" font-family="Segoe UI, sans-serif" font-size="11">Illustration: guide only - your WordPress theme may differ slightly.</text>
</svg>
